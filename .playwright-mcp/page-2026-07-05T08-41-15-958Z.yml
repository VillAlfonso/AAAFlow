                - row "Missing Maurice Sodder (aged 14) Martha Lee Sodder (aged 12) Louis Sodder (aged 10) Jennie Irene Sodder (aged 8) Betty Dolly Sodder (aged 5)" [ref=f2e151]:
                  - rowheader "Missing" [ref=f2e152]
                  - cell "Maurice Sodder (aged 14) Martha Lee Sodder (aged 12) Louis Sodder (aged 10) Jennie Irene Sodder (aged 8) Betty Dolly Sodder (aged 5)" [ref=f2e153]:
                    - list [ref=f2e155]:
                      - listitem [ref=f2e156]: Maurice Sodder (aged 14)
                      - listitem [ref=f2e157]: Martha Lee Sodder (aged 12)
                      - listitem [ref=f2e158]: Louis Sodder (aged 10)
                      - listitem [ref=f2e159]: Jennie Irene Sodder (aged 8)
                      - listitem [ref=f2e160]: Betty Dolly Sodder (aged 5)
                - row "Accused Sicilian Mafia" [ref=f2e161]:
                  - rowheader "Accused" [ref=f2e162]
                  - cell "Sicilian Mafia" [ref=f2e163]:
                    - link "Sicilian Mafia" [ref=f2e164] [cursor=pointer]:
                      - /url: //en.wikipedia.org/wiki/Sicilian_Mafia
            - paragraph [ref=f2e165]:
              - text: Early
              - link "Christmas" [ref=f2e166] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Christmas
              - text: morning, December 25, 1945, a fire destroyed the Sodder residence in
              - link "Fayetteville, West Virginia" [ref=f2e167] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Fayetteville,_West_Virginia
              - text: ", United States. At the time, it was occupied by George Sodder, his wife Jennie, and nine of their ten children. During the fire, George, Jennie, and four of the nine children escaped. The bodies of the other five children have never been found. The surviving Sodder family believed for the rest of their lives that the five missing children survived."
              - superscript [ref=f2e168]:
                - link "[1]" [ref=f2e169] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e170]: "[1]"
            - paragraph [ref=f2e171]:
              - text: The Sodders never rebuilt the house, instead converting the site into a memorial garden to the lost children. In the 1950s, as they came to doubt that the children had perished, the family put up a billboard at the site along
              - link "State Route 16" [ref=f2e172] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/West_Virginia_Route_16
              - text: with pictures of the five, offering a reward for information that would bring closure to the case. It remained standing until shortly after Jennie Sodder's death in 1989.
              - superscript [ref=f2e173]:
                - link "[2]" [ref=f2e174] [cursor=pointer]:
                  - /url: "#cite_note-NPR_story-3"
                  - generic [ref=f2e175]: "[2]"
            - paragraph [ref=f2e176]:
              - text: In support of their belief that the children survived, the Sodders had pointed to a number of unusual circumstances before and during the fire. George disputed the Fayetteville fire department's finding that the blaze was electrical in origin, noting that he had recently had the house rewired and inspected. George and his wife suspected
              - link "arson" [ref=f2e177] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Arson
              - text: ", leading to theories that the children had been taken by the"
              - link "Sicilian Mafia" [ref=f2e178] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Sicilian_Mafia
              - text: ", perhaps in retaliation for George's outspoken criticism of the"
              - link "fascist government" [ref=f2e179] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Fascist_Italy_(1922-1943)
              - text: of his native Italy.
            - paragraph [ref=f2e180]:
              - text: State and federal efforts to investigate the case further in the early 1950s yielded no new information. The family did, however, later receive what may have been a picture of one of the boys as an adult during the 1960s. Their last surviving daughter, Sylvia, along with their grandchildren, continued to publicize the case in the 21st century in the media and online.
              - superscript [ref=f2e181]:
                - link "[3]" [ref=f2e182] [cursor=pointer]:
                  - /url: "#cite_note-Obit-4"
                  - generic [ref=f2e183]: "[3]"
          - region "Background" [ref=f2e184]:
            - generic [ref=f2e185]:
              - heading "Background" [level=2] [ref=f2e186]
              - generic [ref=f2e187]:
                - link "edit":
                  - /url: /w/index.php?title=Sodder_children_disappearance&action=edit&section=1
            - paragraph [ref=f2e188]:
              - text: George Sodder was born with the name Giorgio Soddu in
              - link "Tula, Sardinia" [ref=f2e189] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Tula,_Sardinia
              - text: ","
              - link "Italy" [ref=f2e190] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Kingdom_of_Italy
              - text: ", in 1895. He"
              - link "immigrated to the United States" [ref=f2e191] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Italian_American#The_period_of_peak_immigration_(1890–1917)
              - text: 13 years later, with an older brother who went back home as soon as both boys had cleared customs at
              - link "Ellis Island" [ref=f2e192] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Ellis_Island
              - text: . For the rest of his life, George, as he came to be known, would not talk much about why he had left his homeland.
              - superscript [ref=f2e193]:
                - link "[1]" [ref=f2e194] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e195]: "[1]"
            - paragraph [ref=f2e196]:
              - text: Sodder eventually found work on the railroads in
              - link "Pennsylvania" [ref=f2e197] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Pennsylvania
              - text: ", carrying water and other supplies to workers. After a few years he took more permanent work as a driver in"
              - link "Smithers, West Virginia" [ref=f2e198] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Smithers,_West_Virginia
              - text: . He then started his own trucking company, initially hauling
              - link "fill dirt" [ref=f2e199] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Fill_dirt
              - text: to construction sites and later hauling coal mined in the region. Jennie Cipriani, a storekeeper's daughter in Smithers who had also emigrated from Italy in her childhood, married George in 1922.
              - superscript [ref=f2e200]:
                - link "[1]" [ref=f2e201] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e202]: "[1]"
            - paragraph [ref=f2e203]:
              - text: The Sodders settled outside nearby
              - link "Fayetteville" [ref=f2e204] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Fayetteville,_West_Virginia
              - text: ", which had a large population of Italian immigrants, in a two-story"
              - link "timber frame" [ref=f2e205] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Timber_framing
              - text: house two miles (3.2 km) north of town.
              - superscript [ref=f2e206]:
                - link "[4]" [ref=f2e207] [cursor=pointer]:
                  - /url: "#cite_note-AP_story_in_BYT-5"
                  - generic [ref=f2e208]: "[4]"
              - text: In 1923, they had the first of their ten children. George's business prospered, and they became "one of the most respected middle-class families around" in the words of one local official. However, George had strong opinions about many subjects and was not shy about expressing them, sometimes alienating people. In particular, his strident opposition to Italian dictator
              - link "Benito Mussolini" [ref=f2e209] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Benito_Mussolini
              - text: had led to some strong arguments with other members of the immigrant community.
              - superscript [ref=f2e210]:
                - link "[1]" [ref=f2e211] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e212]: "[1]"
            - paragraph [ref=f2e213]:
              - text: The last of the Sodder children, Sylvia, was born in 1942.
              - superscript [ref=f2e214]:
                - link "[5]" [ref=f2e215] [cursor=pointer]:
                  - /url: "#cite_note-6"
                  - generic [ref=f2e216]: "[5]"
              - text: By then, their second-oldest son, Joe (17), had left home to serve in the military during
              - link "World War II" [ref=f2e217] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/World_War_II
              - text: . The following year, Mussolini was deposed, and in 1945, executed. However, George's criticism of the late dictator had left some hard feelings. In October 1945,
              - superscript [ref=f2e218]:
                - link "[6]" [ref=f2e219] [cursor=pointer]:
                  - /url: "#cite_note-Encyclopedia_of_Unsolved_Crime-7"
                  - generic [ref=f2e220]: "[6]"
              - text: a visiting
              - link "life insurance" [ref=f2e221] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Life_insurance
              - text: salesman, after being rebuffed, warned George that his house "[would go] up in smoke ... and your children are going to be destroyed", attributing this all to "the dirty remarks you have been making about Mussolini." Another visitor to the house, ostensibly seeking work, took the occasion to go around to the back and warned George that a pair of
              - link "fuse boxes" [ref=f2e222] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Fuse_box
              - text: would "cause a fire someday." George was puzzled by the observation, since he had just had the house rewired when an electric stove was installed,
              - superscript [ref=f2e223]:
                - link "[7]" [ref=f2e224] [cursor=pointer]:
                  - /url: "#cite_note-1968_Gazette-Mail_story-8"
                  - generic [ref=f2e225]: "[7]"
              - text: and the local electric company had said afterwards it was safe. In the weeks before
              - link "Christmas" [ref=f2e226] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Christmas
              - text: that year, George's older sons had also noticed a strange car parked along the main highway through town, its occupants watching the younger Sodder children as they returned from school.
              - superscript [ref=f2e227]:
                - link "[1]" [ref=f2e228] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e229]: "[1]"
          - region "Christmas Eve 1945 house fire" [ref=f2e230]:
            - generic [ref=f2e231]:
              - heading "Christmas Eve 1945 house fire" [level=2] [ref=f2e232]
              - generic [ref=f2e233]:
                - link "edit":
                  - /url: /w/index.php?title=Sodder_children_disappearance&action=edit&section=2
            - paragraph [ref=f2e234]:
              - text: The Sodder family celebrated on
              - link "Christmas Eve" [ref=f2e235] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Christmas_Eve
              - text: 1945. Marion (19), the oldest daughter, had been working at a
              - link "dime store" [ref=f2e236] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Dime_store
              - text: in downtown Fayetteville, and she surprised three of her younger sisters—Martha (12), Jennie (8), and Betty (5)
              - superscript [ref=f2e237]:
                - link "[8]" [ref=f2e238] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e239]: "[8]"
              - text: —with new toys she had bought for them as gifts. The younger children were so excited that they asked their mother if they could stay up past what would have been their usual bedtime.
              - superscript [ref=f2e240]:
                - link "[8]" [ref=f2e241] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e242]: "[8]"
            - paragraph [ref=f2e243]:
              - text: At 10 p.m., Jennie told them they could stay up a little later, as long as the two oldest boys who were still awake, 14-year-old Maurice and his 9-year-old brother Louis, remembered to put the cows in and feed the chickens before going to bed themselves. George and the two oldest boys, John (22) and George Jr. (16), who had spent the day working with their father, were already asleep. After reminding the children of those remaining chores, she took Sylvia (3) upstairs with her, and they went to bed together.
              - superscript [ref=f2e244]:
                - link "[8]" [ref=f2e245] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e246]: "[8]"
            - paragraph [ref=f2e247]:
              - text: The telephone rang at 12:30 a.m. Jennie woke and went downstairs to answer it. The caller was a woman whose voice she did not recognize, asking for a name she was not familiar with, with the sound of laughter and
              - link "clinking glasses" [ref=f2e248] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Clinking_glasses
              - text: in the background. Jennie told the caller she had reached the wrong number, later recalling the woman's "weird laugh". She hung up and returned to bed. As she did, she noticed that the lights were still on and the curtains were not drawn, two things the children normally attended to when they stayed up later than their parents.
              - superscript [ref=f2e249]:
                - link "[7]" [ref=f2e250] [cursor=pointer]:
                  - /url: "#cite_note-1968_Gazette-Mail_story-8"
                  - generic [ref=f2e251]: "[7]"
              - text: Marion had fallen asleep on the living room couch, so Jennie assumed the other children who had stayed up later had gone back up to the attic where they slept.
              - superscript [ref=f2e252]:
                - link "[1]" [ref=f2e253] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e254]: "[1]"
              - text: She closed the curtains, turned out the lights, and returned to bed.
              - superscript [ref=f2e255]:
                - link "[7]" [ref=f2e256] [cursor=pointer]:
                  - /url: "#cite_note-1968_Gazette-Mail_story-8"
                  - generic [ref=f2e257]: "[7]"
            - paragraph [ref=f2e258]:
              - text: At 1 a.m., Jennie was again awakened by the sound of an object hitting the house's roof with a loud bang, then a rolling noise.
              - superscript [ref=f2e259]:
                - link "[1]" [ref=f2e260] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e261]: "[1]"
              - text: After hearing nothing further, she went back to sleep. After another half hour she woke up again, smelling smoke. When she got up again she found that the room George used for his office was on fire around the telephone line and fuse box.
              - superscript [ref=f2e262]:
                - link "[9]" [ref=f2e263] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e264]: "[9]"
              - text: Jennie woke him, and he in turn woke his older sons.
              - superscript [ref=f2e265]:
                - link "[2]" [ref=f2e266] [cursor=pointer]:
                  - /url: "#cite_note-NPR_story-3"
                  - generic [ref=f2e267]: "[2]"
            - paragraph [ref=f2e268]:
              - text: Both parents and four of their children—Marion, Sylvia, John, and George Jr.—escaped the house. They frantically yelled to the children upstairs but heard no response; they could not go up there as the stairway itself was already aflame.
              - superscript [ref=f2e269]:
                - link "[6]" [ref=f2e270] [cursor=pointer]:
                  - /url: "#cite_note-Encyclopedia_of_Unsolved_Crime-7"
                  - generic [ref=f2e271]: "[6]"
              - text: John said in his first police interview after the fire that he went up to the attic to alert his siblings sleeping there, though he later changed his story to say that he only called up there and did not actually see them.
              - superscript [ref=f2e272]:
                - link "[9]" [ref=f2e273] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e274]: "[9]"
            - paragraph [ref=f2e275]:
              - text: Efforts to find aid and rescue the children were unexpectedly complicated. The phone did not work, so Marion ran to a neighbor's house to call the Fayetteville fire department. A driver on the nearby road had also seen the flames and called from a nearby tavern; they too were unsuccessful either because they could not reach the
              - link "operator" [ref=f2e276] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Switchboard_operator
              - superscript [ref=f2e277]:
                - link "[6]" [ref=f2e278] [cursor=pointer]:
                  - /url: "#cite_note-Encyclopedia_of_Unsolved_Crime-7"
                  - generic [ref=f2e279]: "[6]"
              - text: or because the phone there turned out to be broken. Either the neighbor or the passing motorist was eventually successful in reaching the fire department from another phone in the center of town.
              - superscript [ref=f2e280]:
                - link "[8]" [ref=f2e281] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e282]: "[8]"
            - paragraph [ref=f2e283]:
              - text: George, barefoot,
              - superscript [ref=f2e284]:
                - link "[7]" [ref=f2e285] [cursor=pointer]:
                  - /url: "#cite_note-1968_Gazette-Mail_story-8"
                  - generic [ref=f2e286]: "[7]"
              - text: attempted to climb the house's outside wall
              - superscript [ref=f2e287]:
                - link "[7]" [ref=f2e288] [cursor=pointer]:
                  - /url: "#cite_note-1968_Gazette-Mail_story-8"
                  - generic [ref=f2e289]: "[7]"
              - text: and broke open a window, cutting his arm in the process. He and his sons intended to use a ladder to the attic to rescue the other children, but it was not in its usual spot resting against the house and could not be found nearby. A water barrel that could have been used to extinguish the fire was frozen solid. George then tried to pull both of the trucks he used in his business up to the house and use them to climb to the attic window, but neither of them would start despite having worked perfectly during the previous day.
              - superscript [ref=f2e290]:
                - link "[1]" [ref=f2e291] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e292]: "[1]"
            - paragraph [ref=f2e293]:
              - text: Frustrated, the six Sodders who had escaped had no choice but to watch the house burn down and collapse over the next 45 minutes. They assumed the other five children had perished in the blaze. The fire department, low on manpower due to the war and relying on individual firefighters to call each other, did not respond until later that morning.
              - superscript [ref=f2e294]:
                - link "[2]" [ref=f2e295] [cursor=pointer]:
                  - /url: "#cite_note-NPR_story-3"
                  - generic [ref=f2e296]: "[2]"
              - text: Chief F.J. Morris said the next day that the already slow response was further hampered by his inability to drive the fire truck, requiring that he wait until someone who could drive was available.
              - superscript [ref=f2e297]:
                - link "[8]" [ref=f2e298] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e299]: "[8]"
            - paragraph [ref=f2e300]:
              - text: The firefighters, one of whom was a brother of Jennie's,
              - superscript [ref=f2e301]:
                - link "[10]" [ref=f2e302] [cursor=pointer]:
                  - /url: "#cite_note-Stacy_Horn_blog_post-11"
                  - generic [ref=f2e303]: "[10]"
              - text: could do little but look through the ashes that were left in the Sodders' basement. By 10 a.m., Morris told the Sodders that they had not found any bones, as might have been expected if the other children had been in the house as it burned.
              - superscript [ref=f2e304]:
                - link "[1]" [ref=f2e305] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e306]: "[1]"
              - text: According to another account, they did find a few bone fragments and internal organs, but chose not to tell the family;
              - superscript [ref=f2e307]:
                - link "[2]" [ref=f2e308] [cursor=pointer]:
                  - /url: "#cite_note-NPR_story-3"
                  - generic [ref=f2e309]: "[2]"
              - text: other fire professionals concluded that their search had been cursory at best.
              - superscript [ref=f2e310]:
                - link "[10]" [ref=f2e311] [cursor=pointer]:
                  - /url: "#cite_note-Stacy_Horn_blog_post-11"
                  - generic [ref=f2e312]: "[10]"
              - text: Nevertheless, Morris believed that the five children unaccounted for had died in the fire, suggesting it had been hot enough to burn their bodies completely.
              - superscript [ref=f2e313]:
                - link "[1]" [ref=f2e314] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e315]: "[1]"
          - region "Aftermath" [ref=f2e316]:
            - generic [ref=f2e317]:
              - heading "Aftermath" [level=2] [ref=f2e318]
              - generic [ref=f2e319]:
                - link "edit":
                  - /url: /w/index.php?title=Sodder_children_disappearance&action=edit&section=3
            - paragraph [ref=f2e320]:
              - text: Morris told George to leave the site undisturbed so that the state
              - link "fire marshal" [ref=f2e321] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Fire_marshal
              - text: "'s office could conduct a more thorough investigation. However, after four days, George and his wife could not bear the sight anymore, so he bulldozed 5 feet (1.5 m) of dirt over the site with the intention of converting it to a memorial garden for the lost children. The local"
              - link "coroner" [ref=f2e322] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Coroner
              - text: convened an
              - link "inquest" [ref=f2e323] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Inquest
              - text: the next day, which held that the fire was an accident caused by "faulty wiring".
              - superscript [ref=f2e324]:
                - link "[6]" [ref=f2e325] [cursor=pointer]:
                  - /url: "#cite_note-Encyclopedia_of_Unsolved_Crime-7"
                  - generic [ref=f2e326]: "[6]"
              - text: Among the jurors was the man who had threatened George that his house would be burned down and his children "destroyed" in retribution for his anti-Mussolini remarks.
              - superscript [ref=f2e327]:
                - link "[1]" [ref=f2e328] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e329]: "[1]"
            - paragraph [ref=f2e330]:
              - link "Death certificates" [ref=f2e331] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Death_certificate
              - text: for the five children were issued on December 30.
              - superscript [ref=f2e332]:
                - link "[8]" [ref=f2e333] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e334]: "[8]"
              - text: The local newspaper contradicted itself, stating that all the bodies had been found, but then later in the same story reporting that only part of one body was recovered. George and Jennie were too grief stricken to attend the funeral on January 2, 1946, but their surviving children did.
              - superscript [ref=f2e335]:
                - link "[9]" [ref=f2e336] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e337]: "[9]"
          - region "Family questions about the official account" [ref=f2e338]:
            - generic [ref=f2e339]:
              - heading "Family questions about the official account" [level=2] [ref=f2e340]
              - generic [ref=f2e341]:
                - link "edit":
                  - /url: /w/index.php?title=Sodder_children_disappearance&action=edit&section=4
            - paragraph [ref=f2e342]:
              - text: Not long afterward, as they began to rebuild their lives, the Sodder family started to question all the official findings about the fire. They wondered why, if it had been caused by an electrical problem, the family's
              - link "Christmas lights" [ref=f2e343] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Christmas_lights
              - text: had remained on throughout the fire's early stages, when the power should have gone out. Then, they found the ladder that had been missing from the side of the house on the night of the fire at the bottom of an
              - link "embankment" [ref=f2e344] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Embankment_(transportation)
              - text: 75 feet (23 m) away.
              - superscript [ref=f2e345]:
                - link "[8]" [ref=f2e346] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e347]: "[8]"
            - paragraph [ref=f2e348]:
              - text: A telephone repairman told the Sodders that the house's phone line had not been burned through in the fire, as they had initially thought, but cut by someone who had been willing and able to climb 14 feet (4.3 m) up the pole and reach 2 feet (61 cm) away from it to do so. A man whom neighbors had seen stealing a
              - link "block and tackle" [ref=f2e349] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Block_and_tackle
              - text: from the property around the time of the fire was identified and arrested. He admitted to the theft,
              - superscript [ref=f2e350]:
                - link "[7]" [ref=f2e351] [cursor=pointer]:
                  - /url: "#cite_note-1968_Gazette-Mail_story-8"
                  - generic [ref=f2e352]: "[7]"
              - text: and claimed he had been the one who cut the phone line, thinking it was a power line, but denied having anything to do with the fire. However, no record identifying the suspect exists, and why he would have wanted to cut any utility lines to the Sodder house while stealing the block and tackle has never been explained.
              - superscript [ref=f2e353]:
                - link "[6]" [ref=f2e354] [cursor=pointer]:
                  - /url: "#cite_note-Encyclopedia_of_Unsolved_Crime-7"
                  - generic [ref=f2e355]: "[6]"
              - text: Jennie said in 1968 that if he had cut the power line, she and her husband, along with their other four children, would never have been able to make it out of the house.
              - superscript [ref=f2e356]:
                - link "[7]" [ref=f2e357] [cursor=pointer]:
                  - /url: "#cite_note-1968_Gazette-Mail_story-8"
                  - generic [ref=f2e358]: "[7]"
            - paragraph [ref=f2e359]:
              - text: Jennie also had trouble accepting Morris's belief that all traces of the children's bodies had been burned completely in the fire. Many of the household appliances had been found, still recognizable, in the ash,
              - superscript [ref=f2e360]:
                - link "[1]" [ref=f2e361] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e362]: "[1]"
              - text: along with fragments of the tin roof.
              - superscript [ref=f2e363]:
                - link "[8]" [ref=f2e364] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e365]: "[8]"
              - text: She contrasted the results of the fire with a newspaper account of a similar house fire that she read around the same time that killed a family of seven; skeletal remains of all the victims were reported to have been found in that case.
              - superscript [ref=f2e366]:
                - link "[7]" [ref=f2e367] [cursor=pointer]:
                  - /url: "#cite_note-1968_Gazette-Mail_story-8"
                  - generic [ref=f2e368]: "[7]"
              - text: Jennie burned small piles of animal bones to see if they would be completely consumed; none ever were. An employee of a local
              - link "crematorium" [ref=f2e369] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Crematorium
              - text: she contacted told her that human bones remain even after bodies are burned at 2,000 °F (1,090 °C) for two hours, far longer and hotter than the house fire could have been.
              - superscript [ref=f2e370]:
                - link "[1]" [ref=f2e371] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e372]: "[1]"
            - paragraph [ref=f2e373]:
              - text: The Sodders' trucks' failure to start was also considered. George believed they had been tampered with, perhaps by the same man who stole the block and tackle and cut the phone line. However, one of George's sons-in-law told the
              - link "Charleston Gazette-Mail" [ref=f2e375] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Charleston_Gazette-Mail
              - text: in 2013 that he had come to believe that Sodder and his sons might have, in their haste to start the trucks,
              - link "flooded the engines" [ref=f2e376] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Flooded_engine
              - text: .
              - superscript [ref=f2e377]:
                - link "[9]" [ref=f2e378] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e379]: "[9]"
            - paragraph [ref=f2e380]:
              - text: Some accounts have suggested the wrong-number phone call to the Sodder house might have also somehow been connected to the fire.
              - superscript [ref=f2e381]:
                - link "[8]" [ref=f2e382] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e383]: "[8]"
              - text: However, investigators later located the woman who had made the call. She confirmed it had been a wrong number on her part.
              - superscript [ref=f2e384]:
                - link "[10]" [ref=f2e385] [cursor=pointer]:
                  - /url: "#cite_note-Stacy_Horn_blog_post-11"
                  - generic [ref=f2e386]: "[10]"
          - region "Subsequent developments" [ref=f2e387]:
            - generic [ref=f2e388]:
              - heading "Subsequent developments" [level=2] [ref=f2e389]
              - generic [ref=f2e390]:
                - link "edit":
                  - /url: /w/index.php?title=Sodder_children_disappearance&action=edit&section=5
            - paragraph [ref=f2e391]:
              - text: As spring approached, the Sodders, as they had said they would, planted flowers in the soil bulldozed over the house. Jennie tended it carefully for the rest of her life.
              - superscript [ref=f2e392]:
                - link "[9]" [ref=f2e393] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e394]: "[9]"
              - text: However, further developments in early 1946 reinforced the family's belief that the children they were memorializing might, in fact, be alive somewhere.
              - superscript [ref=f2e395]:
                - link "[8]" [ref=f2e396] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e397]: "[8]"
            - paragraph [ref=f2e398]:
              - text: Evidence soon emerged indicating that the fire had not started in an electrical fault and was instead set deliberately. The driver of a bus that passed through Fayetteville late Christmas Eve said he had seen some people throwing "balls of fire" at the house.
              - superscript [ref=f2e399]:
                - link "[6]" [ref=f2e400] [cursor=pointer]:
                  - /url: "#cite_note-Encyclopedia_of_Unsolved_Crime-7"
                  - generic [ref=f2e401]: "[6]"
              - text: A few months later, when the snow had melted, Sylvia found a small, hard, dark-green, rubber ball-like object in the brush nearby. George, recalling his wife's account of a loud thump on the roof before the fire, said it looked like a "pineapple bomb"
              - link "hand grenade" [ref=f2e402] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Hand_grenade
              - text: or some other
              - link "incendiary device" [ref=f2e403] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Incendiary_device
              - text: used in combat. The family later claimed that, contrary to the fire marshal's conclusion, the fire had started on the roof, although by then there was no way to prove it.
              - superscript [ref=f2e404]:
                - link "[8]" [ref=f2e405] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e406]: "[8]"
            - paragraph [ref=f2e407]:
              - text: Other witnesses claimed to have seen the missing Sodder children themselves. One woman who had been watching the fire from the road said she had seen some of them peering out of a passing car while the house was burning. Another woman at a
              - link "rest stop" [ref=f2e408] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Rest_stop
              - text: between Fayetteville and
              - link "Charleston" [ref=f2e409] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Charleston,_West_Virginia
              - text: said she had served them breakfast the next morning, and noted the presence of a car with
              - link "Florida license plates" [ref=f2e410] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Vehicle_registration_plates_of_Florida
              - text: in the rest stop's parking lot as well.
              - superscript [ref=f2e411]:
                - link "[1]" [ref=f2e412] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e413]: "[1]"
            - paragraph [ref=f2e414]:
              - text: The Sodders hired a
              - link "private investigator" [ref=f2e415] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Private_investigator
              - text: named C.C. Tinsley from the nearby town of
              - link "Gauley Bridge" [ref=f2e416] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Gauley_Bridge,_West_Virginia
              - superscript [ref=f2e417]:
                - link "[1]" [ref=f2e418] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e419]: "[1]"
              - text: to look into the case. Tinsley informed the family that the insurance salesman who had threatened George over his anti-Mussolini sentiments had been on the coroner's jury that ruled the fire an accident. He also learned of rumors around Fayetteville that despite his report to the Sodders that no remains had been found in the ashes, Morris had found a heart which he later packed into a metal box and secretly buried.
              - superscript [ref=f2e420]:
                - link "[1]" [ref=f2e421] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e422]: "[1]"
            - paragraph [ref=f2e423]:
              - text: Morris had apparently confessed this to a local minister, who in turn confirmed it to George. George and Tinsley went to Morris and confronted him with this news. Morris agreed to show the two where he had buried the metal box and they dug it up. They took what they found inside the box to a local
              - link "funeral director" [ref=f2e424] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Funeral_director
              - text: ", who after examining it told them it was in reality fresh"
              - link "beef liver" [ref=f2e425] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Beef_liver
              - text: that had never been exposed to fire. Later, more rumors circulated around Fayetteville—that Morris had afterwards admitted the box with the liver had indeed not come from the fire originally; he had supposedly placed it there in the hope that the Sodders would find it and be satisfied that the missing children had indeed died in the fire.
              - superscript [ref=f2e426]:
                - link "[1]" [ref=f2e427] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e428]: "[1]"
          - region "1949 excavation" [ref=f2e429]:
            - generic [ref=f2e430]:
              - heading "1949 excavation" [level=2] [ref=f2e431]
              - generic [ref=f2e432]:
                - link "edit":
                  - /url: /w/index.php?title=Sodder_children_disappearance&action=edit&section=6
            - paragraph [ref=f2e433]:
              - text: On one occasion, George saw a magazine photo of a group of young ballet dancers in
              - link "New York City" [ref=f2e434] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/New_York_City
              - text: ", one of whom looked like his missing daughter Betty. He drove all the way to the girl's school, where his repeated demands to see the girl himself were refused."
              - superscript [ref=f2e435]:
                - link "[1]" [ref=f2e436] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e437]: "[1]"
            - paragraph [ref=f2e438]:
              - text: George also tried to interest the
              - link "Federal Bureau of Investigation" [ref=f2e439] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Federal_Bureau_of_Investigation
              - text: (FBI) in investigating what he considered a
              - link "kidnapping" [ref=f2e440] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Kidnapping
              - text: .
              - link "FBI Director" [ref=f2e441] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Director_of_the_FBI
              - link "J. Edgar Hoover" [ref=f2e442] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/J._Edgar_Hoover
              - text: "personally responded to his letters: \"Although I would like to be of service, the matter related appears to be of local character and does not come within the investigative jurisdiction of this bureau.\" If the local authorities requested the bureau's assistance, he added, he would of course direct agents to assist, but the Fayetteville police and fire departments declined to do so."
              - superscript [ref=f2e443]:
                - link "[1]" [ref=f2e444] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e445]: "[1]"
            - paragraph [ref=f2e446]:
              - text: In August 1949, George was able to persuade Oscar Hunter, a
              - link "Washington, D.C." [ref=f2e447] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Washington,_D.C.
              - link "pathologist" [ref=f2e448] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Pathology
              - text: ", to supervise a new search through the dirt at the house site. After a very thorough search, artifacts including a dictionary that had belonged to the children and some coins were found. Several small bone fragments were unearthed, determined to have been human"
              - link "vertebrae" [ref=f2e449] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Vertebra
              - text: .
              - superscript [ref=f2e450]:
                - link "[1]" [ref=f2e451] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e452]: "[1]"
              - text: The bone fragments were sent to Marshall T. Newman, a specialist at the
              - link "Smithsonian Institution" [ref=f2e453] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Smithsonian_Institution
              - text: .
              - superscript [ref=f2e454]:
                - link "[9]" [ref=f2e455] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e456]: "[9]"
              - text: They were confirmed to be
              - link "lumbar vertebrae" [ref=f2e457] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Lumbar_vertebrae
              - text: ", all from the same person. \"Since the transverse recesses are fused, the age of this individual at death should have been 16 or 17 years\", Newman's report said. \"The top limit of age should be about 22 since the centra, which normally fuse at 23, are still unfused\". Thus, given this age range, it was not very likely that these bones were from any of the five missing children, since the oldest, Maurice, had been 14 at the time (although the report allowed that vertebrae of a boy his age sometimes were advanced enough to appear to be at the lower end of the range)."
              - superscript [ref=f2e458]:
                - link "[1]" [ref=f2e459] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e460]: "[1]"
            - paragraph [ref=f2e461]:
              - text: Newman added that the bone showed no sign of exposure to flame. Further, he agreed that it was "very strange" that those bones were the only ones found, since a wood fire of such short duration should have left full skeletons of all of the children behind. The report concluded that the vertebrae had, instead, most likely come from the dirt that George had used to bulldoze the site.
              - superscript [ref=f2e462]:
                - link "[1]" [ref=f2e463] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e464]: "[1]"
              - text: Later, Tinsley supposedly confirmed that the bone fragments had come from a cemetery in nearby
              - link "Mount Hope" [ref=f2e465] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Mount_Hope,_West_Virginia
              - text: ", but could not explain why they had been taken from there or how they came to be at the fire site."
              - superscript [ref=f2e466]:
                - link "[6]" [ref=f2e467] [cursor=pointer]:
                  - /url: "#cite_note-Encyclopedia_of_Unsolved_Crime-7"
                  - generic [ref=f2e468]: "[6]"
              - text: The Smithsonian returned the bone fragments to George in September 1949, according to its records; their current location is unknown.
              - superscript [ref=f2e469]:
                - link "[9]" [ref=f2e470] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e471]: "[9]"
            - paragraph [ref=f2e472]:
              - text: The investigation and its findings attracted national attention, and the
              - link "West Virginia Legislature" [ref=f2e473] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/West_Virginia_Legislature
              - text: held two hearings on the case in 1950. Afterwards, however,
              - link "Governor" [ref=f2e474] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Governor_of_West_Virginia
              - link "Okey L. Patteson" [ref=f2e475] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Okey_L._Patteson
              - text: and
              - link "state police" [ref=f2e476] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/West_Virginia_State_Police
              - text: superintendent W.E. Burchett told the Sodders the case was "hopeless" and closed it at the state level.
              - superscript [ref=f2e477]:
                - link "[1]" [ref=f2e478] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e479]: "[1]"
              - text: The FBI decided it had jurisdiction as a possible interstate kidnapping but dropped the case after two years of following fruitless leads.
              - superscript [ref=f2e480]:
                - link "[6]" [ref=f2e481] [cursor=pointer]:
                  - /url: "#cite_note-Encyclopedia_of_Unsolved_Crime-7"
                  - generic [ref=f2e482]: "[6]"
          - region "Continuing family investigation" [ref=f2e483]:
            - generic [ref=f2e484]:
              - heading "Continuing family investigation" [level=2] [ref=f2e485]
              - generic [ref=f2e486]:
                - link "edit":
                  - /url: /w/index.php?title=Sodder_children_disappearance&action=edit&section=7
            - paragraph [ref=f2e487]:
              - text: With the end of official efforts to resolve the case, the Sodder family did not give up hope. They had flyers printed up with pictures of the children, offering a $5,000 reward (soon doubled) for information that would have settled the case for even one of them. In 1952, they put up a billboard at the site of the house (and another along
              - link "U.S. Route 60" [ref=f2e488] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/U.S._Route_60
              - text: near
              - link "Ansted" [ref=f2e489] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Ansted,_West_Virginia
              - superscript [ref=f2e490]:
                - link "[6]" [ref=f2e491] [cursor=pointer]:
                  - /url: "#cite_note-Encyclopedia_of_Unsolved_Crime-7"
                  - generic [ref=f2e492]: "[6]"
              - superscript [ref=f2e493]:
                - link "[8]" [ref=f2e494] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e495]: "[8]"
              - text: ) with the same information. It would in time become a landmark for traffic through Fayetteville on
              - link "U.S. Route 19" [ref=f2e496] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/U.S._Route_19
              - text: (today
              - link "State Route 16" [ref=f2e497] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/West_Virginia_State_Route_16
              - text: ).
              - superscript [ref=f2e498]:
                - link "[1]" [ref=f2e499] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e500]: "[1]"
              - superscript [ref=f2e501]:
                - link "[2]" [ref=f2e502] [cursor=pointer]:
                  - /url: "#cite_note-NPR_story-3"
                  - generic [ref=f2e503]: "[2]"
              - superscript [ref=f2e504]:
                - link "[9]" [ref=f2e505] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e506]: "[9]"
            - paragraph [ref=f2e507]:
              - text: The family's efforts soon brought another reported sighting of the children after the fire. Ida Crutchfield,
              - superscript [ref=f2e508]:
                - link "[10]" [ref=f2e509] [cursor=pointer]:
                  - /url: "#cite_note-Stacy_Horn_blog_post-11"
                  - generic [ref=f2e510]: "[10]"
              - text: a woman who ran a Charleston, West Virginia, hotel, claimed to have seen the children approximately a week afterwards. "I do not remember the exact date", she said in a statement. The children had come in, around midnight, with two men and two women, all of whom appeared to her to be "of Italian extraction". When she attempted to speak with the children, "[o]ne of the men looked at me in a hostile manner; he turned around and began talking rapidly in
              - link "Italian" [ref=f2e511] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Italian_language
              - text: . Immediately, the whole party stopped talking to me". She recalled that they left the hotel early the next morning.
              - superscript [ref=f2e512]:
                - link "[1]" [ref=f2e513] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e514]: "[1]"
              - text: Investigators today do not, however, consider her story credible, as she had only first seen photos of the children two years after the fire, five years before she came forward.
              - superscript [ref=f2e515]:
                - link "[10]" [ref=f2e516] [cursor=pointer]:
                  - /url: "#cite_note-Stacy_Horn_blog_post-11"
                  - generic [ref=f2e517]: "[10]"
            - paragraph [ref=f2e518]:
              - text: George followed up leads in person, traveling to the areas from where tips had come. A woman from
              - link "St. Louis, Missouri" [ref=f2e519] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/St._Louis,_Missouri
              - text: ", claimed Martha was being held in a"
              - link "convent" [ref=f2e520] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Convent
              - text: there. A bar patron in
              - link "Texas" [ref=f2e521] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Texas
              - text: claimed to have overheard two other people making incriminating statements about a fire that happened on Christmas Eve in West Virginia some years before. None of those proved significant.
              - superscript [ref=f2e522]:
                - link "[1]" [ref=f2e523] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e524]: "[1]"
              - text: When George heard later that a relative of Jennie's in
              - link "Florida" [ref=f2e525] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Florida
              - text: had children that looked similar to his, the relative had to prove the children were his own before George was satisfied.
              - superscript [ref=f2e526]:
                - link "[10]" [ref=f2e527] [cursor=pointer]:
                  - /url: "#cite_note-Stacy_Horn_blog_post-11"
                  - generic [ref=f2e528]: "[10]"
            - paragraph [ref=f2e529]:
              - text: In 1967, George went to the
              - link "Houston" [ref=f2e530] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Houston,_Texas
              - text: area to investigate another tip. A woman there had written to the family, saying that Louis had revealed his true identity to her one night after having too much to drink. She believed that he and Maurice were both living in Texas somewhere. However, George and his son-in-law, Grover Paxton, were unable to speak with her. Police there were able to help them find the two men she had indicated, but they denied being the missing sons. Paxton said years later that doubts about that denial lingered in George's mind for the rest of his life.
              - superscript [ref=f2e531]:
                - link "[9]" [ref=f2e532] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e533]: "[9]"
            - figure "Photograph received by the family in 1967, believed by them to be an adult Louis" [ref=f2e534]:
              - link "A black and white photograph of a man with dark hair leaning towards the camera slightly, wearing a light-colored shirt with the collar open, against a dark background" [ref=f2e535] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/File:Alleged_1967_photograph_of_Louis_Sodder.jpg
                - img "A black and white photograph of a man with dark hair leaning towards the camera slightly, wearing a light-colored shirt with the collar open, against a dark background" [ref=f2e536]
              - generic [ref=f2e537]: Photograph received by the family in 1967, believed by them to be an adult Louis
            - paragraph [ref=f2e538]:
              - text: Another letter that they received that year brought the Sodders what they believed was the most credible evidence that at least Louis was still alive. One day Jennie found in the mail a letter addressed to her, postmarked in
              - link "Central City, Kentucky" [ref=f2e539] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Central_City,_Kentucky
              - text: ", with no return address. Inside was a picture of a young man of around 30 with features strongly resembling Louis's, who would have been in his 30s if he had survived. On the back was written:"
            - definition [ref=f2e541]:
              - generic [ref=f2e542]:
                - definition [ref=f2e543]: Louis Sodder
                - definition [ref=f2e544]: I love brother Frankie
                - definition [ref=f2e545]: Ilil boys
                - definition [ref=f2e546]:
                  - text: A90132 or 35
                  - superscript [ref=f2e547]:
                    - link "[7]" [ref=f2e548] [cursor=pointer]:
                      - /url: "#cite_note-1968_Gazette-Mail_story-8"
                      - generic [ref=f2e549]: "[7]"
            - paragraph [ref=f2e550]:
              - text: The family hired another private detective to go to Central City and look into the missive, but he never reported back to the Sodders, and they were unable to locate him afterwards.
              - superscript [ref=f2e551]:
                - link "[1]" [ref=f2e552] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e553]: "[1]"
              - text: The picture nonetheless gave them hope. They added it to the billboard (leaving Central City out of it and any other published information out of fear that Louis might come to harm) and put an enlargement of it over their fireplace.
              - superscript [ref=f2e554]:
                - link "[1]" [ref=f2e555] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e556]: "[1]"
            - paragraph [ref=f2e557]:
              - text: George admitted to the
              - link "Charleston Gazette-Mail" [ref=f2e559] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Charleston_Gazette-Mail
              - text: late the next year that the lack of information had been "like hitting a rock wall—we can't go any further". He nevertheless vowed to continue.
              - superscript [ref=f2e560]:
                - link "[7]" [ref=f2e561] [cursor=pointer]:
                  - /url: "#cite_note-1968_Gazette-Mail_story-8"
                  - generic [ref=f2e562]: "[7]"
              - text: "\"Time is running out for us\", he admitted in another interview around that time. \"But we only want to know. If they did die in the fire, we want to be convinced. Otherwise, we want to know what happened to them\"."
              - superscript [ref=f2e563]:
                - link "[1]" [ref=f2e564] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e565]: "[1]"
            - paragraph [ref=f2e566]:
              - text: George Sodder died in 1969. Jennie and her surviving children—except John, who never talked about the night of the fire except to say that the family should accept what happened and move on with their lives
              - superscript [ref=f2e567]:
                - link "[10]" [ref=f2e568] [cursor=pointer]:
                  - /url: "#cite_note-Stacy_Horn_blog_post-11"
                  - generic [ref=f2e569]: "[10]"
              - text: —continued to seek answers to their questions about the missing children's fate. After George's death, Jennie stayed in the family home, putting up fencing around it and adding additional rooms. For the rest of her life she
              - link "wore black in mourning" [ref=f2e570] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Mourning#Continental_Europe
              - text: and tended the garden at the site of the former house. After her death in 1989, the family finally took the weathered, worn billboard down.
              - superscript [ref=f2e571]:
                - link "[1]" [ref=f2e572] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e573]: "[1]"
            - paragraph [ref=f2e574]:
              - text: The surviving Sodder children, joined by their own children, continued to publicize the case and investigate leads. They, along with older Fayetteville residents, have theorized that the
              - link "Sicilian Mafia" [ref=f2e575] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Sicilian_Mafia
              - text: was trying to
              - link "extort" [ref=f2e576] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Extortion
              - text: money from George and the children may have been taken by someone who knew about the planned arson and said they would be safe if they left the house.
              - superscript [ref=f2e577]:
                - link "[1]" [ref=f2e578] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e579]: "[1]"
              - text: They were possibly taken back to Italy.
              - superscript [ref=f2e580]:
                - link "[2]" [ref=f2e581] [cursor=pointer]:
                  - /url: "#cite_note-NPR_story-3"
                  - generic [ref=f2e582]: "[2]"
              - text: If the children had survived all those years and were aware that their parents and siblings had survived too, the family believes, they may have avoided contact in order to keep them from harm.
              - superscript [ref=f2e583]:
                - link "[1]" [ref=f2e584] [cursor=pointer]:
                  - /url: "#cite_note-Smithsonian_story-2"
                  - generic [ref=f2e585]: "[1]"
            - paragraph [ref=f2e586]:
              - text: Sylvia Sodder Paxton, the youngest of the surviving Sodder siblings, died in 2021.
              - superscript [ref=f2e587]:
                - link "[3]" [ref=f2e588] [cursor=pointer]:
                  - /url: "#cite_note-Obit-4"
                  - generic [ref=f2e589]: "[3]"
              - text: She was in the house on the night of the fire, which she said was her earliest memory. "I was the last one of the kids to leave home", she recalled to the Gazette-Mail in 2013. She and her father often stayed up late, talking about what might have happened. "I experienced their grief for a long time". She believed that her siblings survived that night, and assisted with efforts to find them and publicize the case.
              - superscript [ref=f2e590]:
                - link "[9]" [ref=f2e591] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e592]: "[9]"
              - text: "Her daughter said in 2006: \"She promised my grandparents she wouldn't let the story die, that she would do everything she could\"."
              - superscript [ref=f2e593]:
                - link "[8]" [ref=f2e594] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e595]: "[8]"
            - paragraph [ref=f2e596]:
              - text: In the 21st century, the family's efforts have come to include online forums like
              - link "websleuths.com" [ref=f2e597] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Websleuths.com
              - text: in addition to media coverage.
              - superscript [ref=f2e598]:
                - link "[6]" [ref=f2e599] [cursor=pointer]:
                  - /url: "#cite_note-Encyclopedia_of_Unsolved_Crime-7"
                  - generic [ref=f2e600]: "[6]"
              - superscript [ref=f2e601]:
                - link "[8]" [ref=f2e602] [cursor=pointer]:
                  - /url: "#cite_note-Register-Herald_story-9"
                  - generic [ref=f2e603]: "[8]"
              - text: "The increase in the latter has led some who have examined the case to believe that the children did, in fact, die in 1945. George Bragg, a local author who wrote about the case in his 2012 book West Virginia's Unsolved Murders, believes that John was telling the truth in his original account, when he said he tried to physically awaken his siblings before fleeing the house. He allows that that conclusion may still not be correct: \"Logic tells you they probably did burn up in the fire, but you can't always go by logic.\""
              - superscript [ref=f2e604]:
                - link "[9]" [ref=f2e605] [cursor=pointer]:
                  - /url: "#cite_note-Gazette-Mail_story-10"
                  - generic [ref=f2e606]: "[9]"
            - paragraph [ref=f2e607]:
              - link "Stacy Horn" [ref=f2e608] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/Stacy_Horn
              - text: ", who did a segment on the case for"
              - link "National Public Radio" [ref=f2e609] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/National_Public_Radio
              - text: around its 60th anniversary in 2005, also believes the children's death in the fire is the most plausible solution. In a contemporaneous post on her blog with material she had to cut from her story for time, she noted that the fire had continued to smolder all night after the house collapsed and that two hours was not enough time to search the ash thoroughly. Even if it had been, the firefighters may not have known what to look for. "However", she said, "there is enough genuine weirdness about this whole thing ... that if someday it is learned that the children did not die in the fire I won't be shocked".
              - superscript [ref=f2e610]:
                - link "[10]" [ref=f2e611] [cursor=pointer]:
                  - /url: "#cite_note-Stacy_Horn_blog_post-11"
                  - generic [ref=f2e612]: "[10]"
            - paragraph [ref=f2e613]:
              - text: In 2022, the
              - link "History Channel" [ref=f2e614] [cursor=pointer]:
                - /url: //en.wikipedia.org/wiki/History_Channel
              - text: aired an episode of its series, History's Greatest Mysteries, that detailed the events of the case.
              - superscript [ref=f2e615]:
                - link "[11]" [ref=f2e616] [cursor=pointer]:
                  - /url: "#cite_note-12"
                  - generic [ref=f2e617]: "[11]"
          - region "See also" [ref=f2e618]:
            - generic [ref=f2e619]:
              - heading "See also" [level=2] [ref=f2e620]
              - generic [ref=f2e621]:
                - link "edit":
                  - /url: /w/index.php?title=Sodder_children_disappearance&action=edit&section=8
            - list [ref=f2e622]:
              - listitem [ref=f2e623]:
                - link "Beaumont children disappearance" [ref=f2e624] [cursor=pointer]:
                  - /url: //en.wikipedia.org/wiki/Beaumont_children_disappearance
                - text: ", in Adelaide, Australia, 1966; three children disappeared while walking together in a beach town."
              - listitem [ref=f2e625]:
                - 'link "Little Girl Lost: The Delimar Vera Story" [ref=f2e627] [cursor=pointer]':
                  - /url: //en.wikipedia.org/wiki/Little_Girl_Lost:_The_Delimar_Vera_Story
                - text: ", based on an actual child who disappeared in Philadelphia in 1997; the kidnapper set a fire to cover her action and the fire department falsely declared her dead"
              - listitem [ref=f2e628]:
                - link "Murders of Lauria Bible and Ashley Freeman" [ref=f2e629] [cursor=pointer]:
                  - /url: //en.wikipedia.org/wiki/Murders_of_Lauria_Bible_and_Ashley_Freeman
                - text: ", two teenage girls whose remains were not found after a 1999 Oklahoma fire destroyed Freeman's home while Bible was sleeping over; Freeman's parents were found to have been killed before the fire. In 2018 it was learned that they had been taken alive and held in captivity for several days before being killed, leading to a 2020 conviction of the surviving murderer."
              - listitem [ref=f2e630]:
                - 'link "List of people who disappeared mysteriously: 1910–1990" [ref=f2e631] [cursor=pointer]':
                  - /url: //en.wikipedia.org/wiki/List_of_people_who_disappeared_mysteriously:_1910–1990
