<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AAAFlow Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23e6a94b'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle' fill='%230a0c0f' font-family='serif' font-weight='700'%3EA%3C/text%3E%3C/svg%3E" />
</head>
<body>
<div class="grain"></div>

<div class="app">
  <aside class="rail">
    <div class="brand">
      <div class="brand-mark"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="brand-name"><strong>AAAFlow</strong><em>Studio</em></div>
    </div>

    <nav class="nav" id="nav"></nav>

    <div class="rail-foot">
      <div class="proj-chip" id="projChip" hidden></div>
      <div class="chips">
        <span class="chip" id="chipDevice">GPU</span>
        <span class="chip" id="chipFlux">FLUX</span>
        <span class="chip chip-warn" id="chipFfmpeg" hidden>no ffmpeg</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar" id="topbar"></header>
    <div id="views" class="views"></div>
  </main>
</div>

<div id="toasts" class="toasts"></div>
<div id="modal" class="modal" hidden><div class="modal-card" id="modalCard"></div></div>
